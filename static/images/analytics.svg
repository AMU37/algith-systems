<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00A09D;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#017E84;stop-opacity:0.05" />
    </linearGradient>
  </defs>
  <rect fill="url(#bg)" width="400" height="300" rx="16"/>
  <!-- Chart illustration -->
  <rect x="40" y="40" width="320" height="220" rx="12" fill="white" stroke="#EBEBEB" stroke-width="1"/>
  <!-- Header -->
  <rect x="60" y="60" width="120" height="12" rx="4" fill="#714B67"/>
  <rect x="60" y="80" width="80" height="8" rx="4" fill="#999"/>
  <!-- Line chart -->
  <path d="M60 200 L120 180 L180 190 L240 150 L300 160 L340 130" stroke="#714B67" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M60 200 L120 180 L180 190 L240 150 L300 160 L340 130 L340 220 L60 220 Z" fill="#714B67" opacity="0.1"/>
  <!-- Data points -->
  <circle cx="60" cy="200" r="5" fill="#714B67"/>
  <circle cx="120" cy="180" r="5" fill="#714B67"/>
  <circle cx="180" cy="190" r="5" fill="#714B67"/>
  <circle cx="240" cy="150" r="5" fill="#714B67"/>
  <circle cx="300" cy="160" r="5" fill="#714B67"/>
  <circle cx="340" cy="130" r="5" fill="#00A09D"/>
  <!-- Second line -->
  <path d="M60 210 L120 200 L180 205 L240 180 L300 190 L340 170" stroke="#00A09D" stroke-width="2" fill="none" stroke-linecap="round" stroke-dasharray="4,4"/>
  <!-- Grid lines -->
  <line x1="60" y1="160" x2="340" y2="160" stroke="#EBEBEB" stroke-width="1"/>
  <line x1="60" y1="180" x2="340" y2="180" stroke="#EBEBEB" stroke-width="1"/>
  <line x1="60" y1="200" x2="340" y2="200" stroke="#EBEBEB" stroke-width="1"/>
</svg>
