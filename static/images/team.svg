<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#17A2B8;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#006064;stop-opacity:0.05" />
    </linearGradient>
  </defs>
  <rect fill="url(#bg)" width="400" height="300" rx="16"/>
  <!-- Team members -->
  <g transform="translate(80, 40)">
    <!-- Person 1 -->
    <circle cx="40" cy="40" r="24" fill="#714B67"/>
    <circle cx="40" cy="32" r="10" fill="white" opacity="0.9"/>
    <path d="M24 56 Q40 44 56 56 L56 64 L24 64 Z" fill="white" opacity="0.9"/>
    <rect x="20" y="70" width="40" height="6" rx="3" fill="#714B67"/>
    <rect x="28" y="80" width="24" height="4" rx="2" fill="#999"/>
  </g>
  <g transform="translate(160, 40)">
    <!-- Person 2 -->
    <circle cx="40" cy="40" r="24" fill="#00A09D"/>
    <circle cx="40" cy="32" r="10" fill="white" opacity="0.9"/>
    <path d="M24 56 Q40 44 56 56 L56 64 L24 64 Z" fill="white" opacity="0.9"/>
    <rect x="20" y="70" width="40" height="6" rx="3" fill="#00A09D"/>
    <rect x="28" y="80" width="24" height="4" rx="2" fill="#999"/>
  </g>
  <g transform="translate(240, 40)">
    <!-- Person 3 -->
    <circle cx="40" cy="40" r="24" fill="#F0AD4E"/>
    <circle cx="40" cy="32" r="10" fill="white" opacity="0.9"/>
    <path d="M24 56 Q40 44 56 56 L56 64 L24 64 Z" fill="white" opacity="0.9"/>
    <rect x="20" y="70" width="40" height="6" rx="3" fill="#F0AD4E"/>
    <rect x="28" y="80" width="24" height="4" rx="2" fill="#999"/>
  </g>
  <!-- Connection lines -->
  <line x1="120" y1="100" x2="160" y2="100" stroke="#714B67" stroke-width="2" stroke-dasharray="4,4" opacity="0.5"/>
  <line x1="200" y1="100" x2="240" y2="100" stroke="#00A09D" stroke-width="2" stroke-dasharray="4,4" opacity="0.5"/>
  <!-- Stats bar -->
  <rect x="60" y="160" width="280" height="80" rx="12" fill="white" stroke="#EBEBEB" stroke-width="1"/>
  <rect x="80" y="180" width="60" height="8" rx="4" fill="#714B67"/>
  <rect x="80" y="196" width="40" height="6" rx="3" fill="#999"/>
  <rect x="80" y="212" width="100" height="12" rx="6" fill="#E8F5E9"/>
  <rect x="85" y="215" width="40" height="6" rx="3" fill="#28A745"/>
  <!-- Badge -->
  <rect x="260" y="180" width="60" height="40" rx="8" fill="#714B67"/>
  <text x="290" y="205" text-anchor="middle" fill="white" font-size="14" font-weight="bold">+5</text>
