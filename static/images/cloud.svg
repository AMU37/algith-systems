<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#714B67;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#00A09D;stop-opacity:0.08" />
    </linearGradient>
  </defs>
  <rect fill="url(#bg)" width="400" height="300" rx="16"/>
  <!-- Cloud -->
  <g transform="translate(120, 60)">
    <ellipse cx="80" cy="80" rx="60" ry="40" fill="#714B67" opacity="0.15"/>
    <ellipse cx="50" cy="90" rx="40" ry="30" fill="#714B67" opacity="0.1"/>
    <ellipse cx="110" cy="90" rx="40" ry="30" fill="#00A09D" opacity="0.1"/>
    <ellipse cx="80" cy="70" rx="50" ry="35" fill="#714B67" opacity="0.2"/>
  </g>
  <!-- Devices connecting to cloud -->
  <!-- Laptop -->
  <g transform="translate(40, 200)">
    <rect x="0" y="0" width="60" height="40" rx="4" fill="#2C2C2C"/>
    <rect x="4" y="4" width="52" height="32" rx="2" fill="#F5F5F5"/>
    <rect x="-10" y="40" width="80" height="6" rx="3" fill="#444"/>
    <rect x="15" y="12" width="30" height="4" rx="2" fill="#714B67"/>
    <rect x="15" y="20" width="20" height="3" rx="1.5" fill="#999"/>
  </g>
  <!-- Phone -->
  <g transform="translate(170, 190)">
    <rect x="0" y="0" width="30" height="55" rx="6" fill="#2C2C2C"/>
    <rect x="3" y="8" width="24" height="39" rx="3" fill="#F5F5F5"/>
    <rect x="8" y="14" width="14" height="14" rx="3" fill="#00A09D"/>
    <rect x="8" y="32" width="14" height="4" rx="2" fill="#714B67"/>
  </g>
  <!-- Tablet -->
  <g transform="translate(280, 195)">
    <rect x="0" y="0" width="45" height="50" rx="6" fill="#2C2C2C"/>
    <rect x="4" y="6" width="37" height="38" rx="3" fill="#F5F5F5"/>
    <rect x="10" y="12" width="25" height="10" rx="3" fill="#F0AD4E"/>
    <rect x="10" y="26" width="18" height="4" rx="2" fill="#714B67"/>
  </g>
  <!-- Connection lines -->
  <line x1="70" y1="200" x2="160" y2="150" stroke="#714B67" stroke-width="2" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="185" y1="190" x2="200" y2="150" stroke="#00A09D" stroke-width="2" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="300" y1="195" x2="240" y2="150" stroke="#F0AD4E" stroke-width="2" stroke-dasharray="4,4" opacity="0.4"/>
  <!-- Check marks -->
  <circle cx="160" cy="145" r="8" fill="#28A745"/>
  <text x="160" y="148" text-anchor="middle" fill="white" font-size="8">✓</text>
  <circle cx="200" cy="145" r="8" fill="#28A745"/>
  <text x="200" y="148" text-anchor="middle" fill="white" font-size="8">✓</text>
  <circle cx="240" cy="145" r="8" fill="#28A745"/>
  <text x="240" y="148" text-anchor="middle" fill="white" font-size="8">✓</text>
</svg>
