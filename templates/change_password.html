{% extends "base.html" %}
{% block page_title %}تغيير كلمة المرور{% endblock %}
{% block content %}
<div class="card" style="max-width:500px">
    <div class="card-header">
        <h3 class="card-title"><i class="fas fa-lock"></i> تغيير كلمة المرور</h3>
    </div>
    <form method="POST">
        <div class="modal-body">
            <div class="form-group">
                <label>كلمة المرور الجديدة *</label>
                <input type="password" name="new_password" class="form-control" required minlength="4">
            </div>
            <div class="form-group">
                <label>تأكيد كلمة المرور *</label>
                <input type="password" name="confirm_password" class="form-control" required minlength="4">
            </div>
        </div>
        <div class="modal-footer" style="border:none;padding:0 24px 24px">
            <a href="{{ url_for('dashboard') }}" class="btn btn-outline">إلغاء</a>
            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> حفظ</button>
        </div>
    </form>
</div>
{% endblock %}
