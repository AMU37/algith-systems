{% extends "super_admin/base.html" %}
{% block page_title %}إدارة الأنشطة{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header">
        <h3 class="card-title"><i class="fas fa-th-large"></i> الأنشطة التجارية</h3>
    </div>
    <div class="card-body">
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px">
            {% for key, act in activities.items() %}
            <div class="stat-card" onclick="window.location.href='/super-admin/companies?type={{ key }}'" style="cursor:pointer">
                <div class="stat-icon blue"><i class="fas {{ act.icon or 'fa-building' }}"></i></div>
                <div class="stat-info"><h3>{{ act.name }}</h3><p>{{ act.description or '' }}</p></div>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
