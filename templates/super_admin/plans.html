{% extends "super_admin/base.html" %}
{% block content %}
<div class="card">
    <div class="card-header">
        <h3><i class="fas fa-tags"></i> خطط النظام</h3>
    </div>
    <div class="plans-grid">
        {% for code, plan in system_plans.items() %}
        <div class="plan-card">
            <h3>{{ plan.name }}</h3>
            <div class="plan-price">{{ plan.price }} ر.ي <span>/شهر</span></div>
            <ul class="plan-features">
                <li><i class="fas fa-users"></i> {{ plan.max_users }} مستخدم</li>
                <li><i class="fas fa-calendar"></i> {{ plan.days }} يوم</li>
            </ul>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
